<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 OST Mood Playlist</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">

      <!-- 헤더 -->
      <header>
        <h1>🎵 OST Mood Playlist</h1>
        <p class="subtitle">지금 기분을 입력하면 게임 OST 플레이리스트를 만들어드려요</p>
      </header>

      <!-- 기분 입력 세션 -->
      <section class="mood-section">
        <div class="input-group">
          <textarea
            id="moodInput"
            placeholder="지금 기분이나 상황을 자유롭게 입력해보세요&#10;예) 집중해서 코딩하고 싶어"
            rows="3"
          ></textarea>
        </div>

        <!-- 상황 빠른 선택 -->
        <div class="quick-tags">
          <span class="tag-label">빠른 선택</span>
          <button class="quick-btn" data-situation="코딩" data-query="집중해서 코딩하고 싶어">💻 코딩</button>
          <button class="quick-btn" data-situation="집중" data-query="조용히 집중하고 싶어">🎯 집중</button>
          <button class="quick-btn" data-situation="휴식" data-query="잔잔하게 쉬고 싶어">🌿 휴식</button>
          <button class="quick-btn" data-situation="수면" data-query="편안하게 잠들고 싶어">🌙 수면</button>
          <button class="quick-btn" data-situation="운동" data-query="신나게 운동하고 싶어">💪 운동</button>
          <button class="quick-btn" data-situation="전투" data-query="긴장감 넘치는 전투 음악">⚔️ 전투</button>
          <button class="quick-btn" data-situation="탐험" data-query="모험하는 느낌의 음악">🗺️ 탐험</button>
          <button class="quick-btn" data-situation="감상" data-query="감성적인 음악 듣고 싶어">🎭 감상</button>
        </div>

        <!-- 옵션 -->
        <div class="options">
          <label>
            추천 곡 수
            <select id="topK">
              <option value="5">5곡</option>
              <option value="10">10곡</option>
              <option value="20">20곡</option>
            </select>
          </label>
          <label>
            상황 필터
            <select id="situationFilter">
              <option value="">전체</option>
              <option value="코딩">코딩</option>
              <option value="집중">집중</option>
              <option value="휴식">휴식</option>
              <option value="수면">수면</option>
              <option value="운동">운동</option>
              <option value="전투">전투</option>
              <option value="탐험">탐험</option>
              <option value="감상">감상</option>
            </select>
          </label>
        </div>

        <button id="generateBtn" class="generate-btn">🎵 플레이리스트 생성</button>
      </section>

      <!-- 로딩 -->
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>플레이리스트 생성 중...</p>
      </div>

      <!-- 에러 -->
      <div id="error" class="error hidden"></div>

      <!-- 플레이리스트 결과 -->
      <section id="playlistSection" class="playlist-section hidden">
        <div class="playlist-header">
          <h2 id="playlistTitle"></h2>
          <span id="playlistCount" class="count-badge"></span>
        </div>
        <div id="playlist" class="playlist"></div>
      </section>

    </div>

    <!-- 플레이어 (하단 고정) -->
    <div id="player" class="player hidden">
      <div class="player-info">
        <span id="playerTitle" class="player-title">-</span>
        <span id="playerGame" class="player-game">-</span>
      </div>
      <audio id="audioPlayer" controls></audio>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
